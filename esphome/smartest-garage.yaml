# esphome/smartest-garage.yaml

substitutions:
  device_name: smartest-garage
  friendly_name: Smartest Garage

  # ── HC-SR04 ──────────────────────────────────────────────
  ultrasonic_trigger_pin: GPIO4
  ultrasonic_echo_pin: GPIO5

  # ── Reed switch ──────────────────────────────────────────
  door_sensor_pin: GPIO6

  # ── Relays ───────────────────────────────────────────────
  door_relay_pin: GPIO7       # Optional hardwired backup
  light_relay_pin: GPIO8

  # ── CC1101 SPI ───────────────────────────────────────────
  cc1101_mosi_pin: GPIO10
  cc1101_miso_pin: GPIO11
  cc1101_clk_pin: GPIO12
  cc1101_cs_pin: GPIO13
  cc1101_gdo0_pin: GPIO14

  # ── LD2410 UART (disabled until sensor arrives) ──────────
  ld2410_rx_pin: GPIO16       # ESP RX ← sensor TX
  ld2410_tx_pin: GPIO17       # ESP TX → sensor RX

  # ── Thresholds ───────────────────────────────────────────
  car_presence_threshold: "200"   # cm; car present when distance < this

# ─────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

safe_mode:

# ─────────────────────────────────────────────────────────────
sensor:
  - platform: ultrasonic
    trigger_pin: ${ultrasonic_trigger_pin}
    echo_pin: ${ultrasonic_echo_pin}
    name: "Garage Distance"
    id: garage_distance
    update_interval: 500ms
    unit_of_measurement: cm
    filters:
      - median:
          window_size: 5
          send_every: 3
          send_first_at: 1

# ─────────────────────────────────────────────────────────────
binary_sensor:
  - platform: template
    name: "Car Present"
    id: car_present
    device_class: presence
    lambda: |-
      if (id(garage_distance).state < ${car_presence_threshold}) {
        return true;
      }
      return false;

  - platform: gpio
    pin:
      number: ${door_sensor_pin}
      mode:
        input: true
        pullup: true
    name: "Door Open"
    id: door_open
    internal: true
    device_class: garage_door
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms

# ─────────────────────────────────────────────────────────────
cover:
  - platform: template
    name: "Garage Door"
    id: garage_door
    device_class: garage
    lambda: |-
      if (id(door_open).state) {
        return COVER_OPEN;
      }
      return COVER_CLOSED;
    open_action:
      - switch.turn_on: door_relay
      - delay: 100ms
      - switch.turn_off: door_relay
    close_action:
      - switch.turn_on: door_relay
      - delay: 100ms
      - switch.turn_off: door_relay
    stop_action:
      - switch.turn_on: door_relay
      - delay: 100ms
      - switch.turn_off: door_relay

# ─────────────────────────────────────────────────────────────
switch:
  - platform: gpio
    pin: ${door_relay_pin}
    name: "Door Relay"
    id: door_relay
    internal: true
    restore_mode: ALWAYS_OFF
