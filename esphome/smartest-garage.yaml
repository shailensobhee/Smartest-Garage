# esphome/smartest-garage.yaml

external_components:
  - source: github://gabest11/esphome-cc1101@main
    components: [cc1101]

substitutions:
  device_name: smartest-garage
  friendly_name: Smartest Garage

  # ── HC-SR04 #1 — door position ───────────────────────────
  ultrasonic_trigger_pin: GPIO4
  ultrasonic_echo_pin: GPIO5

  # ── HC-SR04 #2 — car presence (ceiling mount, pointing down) ─
  car_sensor_trigger_pin: GPIO22
  car_sensor_echo_pin: GPIO23

  # ── Reed switch ──────────────────────────────────────────
  door_sensor_pin: GPIO6

  # ── Relays ───────────────────────────────────────────────
  door_relay_pin: GPIO7       # Optional hardwired backup
  light_relay_pin: GPIO8

  # ── CC1101 SPI ───────────────────────────────────────────
  cc1101_mosi_pin: GPIO10
  cc1101_miso_pin: GPIO11
  cc1101_clk_pin: GPIO12
  cc1101_cs_pin: GPIO13
  cc1101_gdo0_pin: GPIO20     # TX — connected to remote_transmitter (avoid GPIO14=JTAG on C6)
  cc1101_gdo2_pin: GPIO21     # RX — connected to remote_receiver (receive/learn)

  # ── LD2410 UART (disabled until sensor arrives) ──────────
  ld2410_rx_pin: GPIO16       # ESP RX ← sensor TX
  ld2410_tx_pin: GPIO17       # ESP TX → sensor RX

  # ── Door position calibration (HC-SR04 #1) ───────────────
  # Measure and set these after mounting:
  door_closed_distance: "30"    # cm — distance reading when door is fully CLOSED
  door_open_distance: "200"     # cm — distance reading when door is fully OPEN
  # If position reads inverted, swap the two values above.

  # ── Car presence threshold (HC-SR04 #2) ──────────────────
  car_presence_threshold: "100"  # cm — car present when ceiling sensor reads below this

# ─────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

safe_mode:

# ─────────────────────────────────────────────────────────────
spi:
  - id: cc1101_spi
    clk_pin: ${cc1101_clk_pin}
    mosi_pin: ${cc1101_mosi_pin}
    miso_pin: ${cc1101_miso_pin}

# ─────────────────────────────────────────────────────────────
# CC1101 transceiver — integrates with remote_transmitter / remote_receiver
# Learn workflow: flash device, open ESPHome logs, press your remote.
# The remote_receiver will automatically dump the captured code + protocol.
# Copy the logged binary code into esphome/secrets.yaml (garage_rf_code)
# and update the protocol block in the cover open/close/stop actions below.
remote_transmitter:
  - id: cc1101_tx
    pin:
      number: ${cc1101_gdo0_pin}
      allow_other_uses: true    # shared with cc1101 sensor component — same physical pin
    carrier_duty_percent: 100%

remote_receiver:
  pin: ${cc1101_gdo2_pin}
  dump:
    - rc_switch
  tolerance: 50%
  filter: 250us
  idle: 4ms

# ─────────────────────────────────────────────────────────────
sensor:
  - platform: cc1101
    id: cc1101_transceiver
    cs_pin: ${cc1101_cs_pin}
    gdo0:
      number: ${cc1101_gdo0_pin}
      allow_other_uses: true    # shared with remote_transmitter — same physical pin
    # gdo2 intentionally omitted — remote_receiver handles GDO2 directly
    bandwidth: 200
    frequency: !secret garage_rf_frequency
    rssi:
      name: "CC1101 RSSI"
      internal: true
    lqi:
      name: "CC1101 LQI"
      internal: true

  # HC-SR04 #1 — door position
  - platform: ultrasonic
    trigger_pin: ${ultrasonic_trigger_pin}
    echo_pin: ${ultrasonic_echo_pin}
    name: "Garage Door Distance"
    id: garage_door_distance
    update_interval: 500ms
    unit_of_measurement: cm
    internal: true    # raw distance; expose position % instead
    filters:
      - median:
          window_size: 5
          send_every: 3
          send_first_at: 1

  - platform: template
    name: "Garage Door Position"
    id: garage_door_position
    unit_of_measurement: "%"
    icon: mdi:garage
    update_interval: 500ms
    lambda: |-
      float dist  = id(garage_door_distance).state;
      float closed = ${door_closed_distance};
      float open   = ${door_open_distance};
      float pos = (dist - closed) / (open - closed) * 100.0f;
      if (pos < 0.0f) pos = 0.0f;
      if (pos > 100.0f) pos = 100.0f;
      return pos;

  # HC-SR04 #2 — car presence (ceiling mount, pointing down)
  - platform: ultrasonic
    trigger_pin: ${car_sensor_trigger_pin}
    echo_pin: ${car_sensor_echo_pin}
    name: "Car Sensor Distance"
    id: car_sensor_distance
    update_interval: 1s
    unit_of_measurement: cm
    internal: true    # raw distance; expose car_present binary sensor instead
    filters:
      - median:
          window_size: 5
          send_every: 3
          send_first_at: 1

# ─────────────────────────────────────────────────────────────
binary_sensor:
  # Car presence — HC-SR04 #2 on ceiling, pointing down
  # Informational only: shows in HA as "Car Present" yes/no
  - platform: template
    name: "Car Present"
    id: car_present
    device_class: presence
    lambda: |-
      return id(car_sensor_distance).state < ${car_presence_threshold};

  # Reed switch — door open/closed state (also drives light automation)
  - platform: gpio
    pin:
      number: ${door_sensor_pin}
      mode:
        input: true
        pullup: true
    name: "Door Open"
    id: door_open
    internal: true
    device_class: garage_door
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    on_press:    # door opened
      - switch.turn_on: garage_light
      - script.stop: light_off_timer     # cancel any pending off-timer
    on_release:  # door closed — start off-timer only if LD2410 also has no presence
      - script.execute: light_off_timer
      # When LD2410 is enabled, replace the above with:
      # - if:
      #     condition:
      #       lambda: return !id(ld2410_presence).state;
      #     then:
      #       - script.execute: light_off_timer

# ─────────────────────────────────────────────────────────────
cover:
  - platform: template
    name: "Garage Door"
    id: garage_door
    device_class: garage
    lambda: |-
      if (id(door_open).state) {
        return COVER_OPEN;
      }
      return COVER_CLOSED;
    open_action:
      - cc1101.begin_tx: cc1101_transceiver
      - remote_transmitter.transmit_rc_switch_raw:
          transmitter_id: cc1101_tx
          code: !secret garage_rf_code
          # ── FILL IN AFTER LEARN STEP ──────────────────────────
          # Run the learn workflow (see docs/ha-automations/), press
          # your remote while watching ESPHome logs, then copy the
          # logged protocol and code values here and into secrets.yaml.
          protocol:
            pulse_length: 420
            sync: [1, 31]
            zero: [1, 3]
            one: [3, 1]
            inverted: false
          repeat:
            times: 10
      - cc1101.end_tx: cc1101_transceiver
    close_action:
      - cc1101.begin_tx: cc1101_transceiver
      - remote_transmitter.transmit_rc_switch_raw:
          transmitter_id: cc1101_tx
          code: !secret garage_rf_code
          protocol:
            pulse_length: 420
            sync: [1, 31]
            zero: [1, 3]
            one: [3, 1]
            inverted: false
          repeat:
            times: 10
      - cc1101.end_tx: cc1101_transceiver
    stop_action:
      - cc1101.begin_tx: cc1101_transceiver
      - remote_transmitter.transmit_rc_switch_raw:
          transmitter_id: cc1101_tx
          code: !secret garage_rf_code
          protocol:
            pulse_length: 420
            sync: [1, 31]
            zero: [1, 3]
            one: [3, 1]
            inverted: false
          repeat:
            times: 10
      - cc1101.end_tx: cc1101_transceiver

# ─────────────────────────────────────────────────────────────
switch:
  - platform: gpio
    pin: ${door_relay_pin}
    name: "Door Relay"
    id: door_relay
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: ${light_relay_pin}
    name: "Garage Light"
    id: garage_light
    device_class: switch
    restore_mode: ALWAYS_OFF

# ─────────────────────────────────────────────────────────────
script:
  - id: light_off_timer
    mode: restart     # Resets the 2-min countdown if triggered again
    then:
      - delay: 2min
      - switch.turn_off: garage_light

# ─────────────────────────────────────────────────────────────
# HLK-LD2410 mmWave sensor — uncomment when hardware arrives
# Wire: sensor TX → ESP GPIO16 (ld2410_rx_pin), sensor RX → ESP GPIO17 (ld2410_tx_pin), 3.3 V power
